<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0d9488, #00f2fe);
            width: 100%;
            height: 100vh;
            justify-content: center;
            align-items: center;
            
        } 
 header{
    background: linear-gradient(to right, #0d9488, #00f2fe);
    padding:20px 40px;
}

.nav-container{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    display:flex;
    align-items:center;
    gap:15px;
    }
.logo img{
    width: 100px;
}

.logo h1{
    margin:0;
    color:#1f2937;
}

.logo p{
    margin:0;
    color:#6b7280;
    font-size:14px;
}


nav ul{
    list-style:none;
    display:flex;
    gap:40px;
    margin:0;
    padding:0;
}

nav a{
    text-decoration:none;
    color:#374151;
    font-size:18px;
    padding:10px 20px;
    border-radius:10px;
}

nav a.active{
    background:#0d9488;
    color:white;
}



nav a:hover{
    background:#0d9488;
    color:white;
    transition: 0.5s;
    transform:translateY(-3px) scale(1.09);
    box-shadow: solid 0px 0px 15px rgba(0,0,0,0.2);
}
    .box{
    background:white;
    padding:30px 40px;
    border-radius:10px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.2);
    width:500px;
    margin: 100px auto;
        }
    .box h2{
    text-align: center;
    color:#0d9488;
    margin-bottom:20px;
    }
    #loginForm label{
    display:block;
    margin-bottom:5px;
    text-align: left;
    font-weight: bold;
    color:#374151;
    font-size: 16px;
    }
    #loginForm input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
    }
    #loginForm button{
    width:100%;
    padding:10px;
    background:#0d9488;
    color:white;
    border:none;
    border-radius:5px;
    font-size: 18px;
    cursor: pointer;
    }
    #loginForm button:hover{
    background:#0d9488;
    color:white;
    transform: translateY(-3px) scale(1.09);
    box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
    transition: 0.5s;
    }
    footer{
    background:#0d9488;
    color:white;
    padding:20px 20px;
    }
    
    .footer-container{
    display:flex;
    justify-content:space-between;
    gap:40px;
    max-width:700px;
    margin:auto;
    }
    
    .footer-left,
    .footer-center,
    .footer-right{
    flex:1;
    }
    

    #follow-us{
    margin-bottom:10px;
    text-align: center;
    }
    #h2{
    margin-left: 18px;
    }
    #h3{
    text-align: center;
    }

    footer ul{
    list-style:none;
    padding:0;
    }

    .footer-right ul{
        display:flex;
        gap:15px;
        align-items:center;
    }
    footer li{
    margin-bottom:10px;
    }   
    

    footer a{
    text-decoration:underline;
    color:#d1fae5;
    font-size: 18px;
    }
    
    footer a:hover{
    transform: translateY(-6px) scale(1.09);
    color:#ccfbf1;
    text-shadow:0 0 8px #ccfbf1;
    transition: 0.5s;
    }
    
    .footer-logo{
        width:30px;
        background:white;
        border-radius:75%;
        padding:5px;
        transition:0.3s;
        }

    .footer-logo:hover{
    transform:translateY(-3px)scale(1.09);
    color:#ccfbf1;
    box-shadow:0 0 10px #ccfbf1;
    }

    #nz-travel{
    text-align: center;
    margin-top: 20px;
    color: #ccfbf1;
    }
    </style>
     <header>

        <div class="nav-container">
        
        <div class="logo">
              <div id="logo">
                    <img src="NZ TravelA.png" alt="NZ Travel">
              </div>
            <h1>NZ Travel</h1>
            <p>Discover New Zealand</p>
        </div>
        
        <nav>
            <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="Northern.html">North Island</a></li>
            <li><a href="Southern.html">South Island</a></li>
            </ul>
        </nav>
        
        </div>
        
    </header>

    <script>
        function showAlert(){
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            if(username == "jacky" && password == "123456"){
                alert("Login successfully！");
                location.href = "index.html";
           }else if(username == "jacky" && password != "123456"){
                alert("Incorrect password.");
           }else if(username != "jacky" && password == "123456"){
                alert("Username not found.");
            }else{
               alert("Invalid username or password.");
            }
        }

    </script>

    <div class="box">
        <h2>Login</h2>
        <form id="loginForm">
            <label for="username">Username:</label>
            <br>
            <input type="text" id="username" name="username" placeholder="Enter your username"><br><br>
            <label for="password">Password:</label>
            <br>
            <input type="password" id="password" name="password" placeholder="Enter yourpassword"><br><br>
            <button type="button" onclick="showAlert()">Login</button>
        </form>
    </div>

    <footer>
        <h3 id="follow-us">Follow us</h3>
            <div class="footer-container">
                <div class="footer-left">
                    <h3>Navigation</h3>
                    <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="Northern.html">North Island</a></li>
                    <li><a href="Southern.html">South Island</a></li>
                    </ul>
                </div>
                <div class="footer-center">
                    <h3 id="h2">Link</h3>
                    <ul>
                        <li><a href="about us.html">About Us</a></li>
                        <li><a href="login.html">Login</a></li>
                        <li><a href="Privacy Policy.html">Privacy Policy</a></li>
                    </ul>
                </div>
                <div class="footer-right">
                    <h3 id="h3">Follow us</h3>
                    <ul>
                        <li><a href="https://www.youtube.com/purenewzealand" target="_blank"><img src="youtube.png" alt="YouTube Logo" class="footer-logo"></a></li>
                        <li><a href="https://www.facebook.com/purenewzealand" target="_blank"><img src="facebook.png" alt="Facebook Logo" class="footer-logo"></a></li>
                        <li><a href="https://twitter.com/purenewzealand" target="_blank"><img src="twitter.png" alt="Twitter Logo" class="footer-logo"></a></li>
                        <li><a href="https://www.instagram.com/purenewzealand/" target="_blank"><img src="instagram.png" alt="Instagram Logo" class="footer-logo"></a></li>
                    </ul>
                </div>
            </div>
                <p id="nz-travel">© 2026 NZ Travel Website</p>
        </footer>
</body>
</html>
